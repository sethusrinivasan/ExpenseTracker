services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/001_create_expenses_table.sql:/docker-entrypoint-initdb.d/001_create_expenses_table.sql

  app:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ..:/app                             # source code from host
      - app_node_modules:/app/node_modules  # node_modules stays in container
      - app_next:/app/.next                 # next build cache stays in container
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NODE_ENV: development
    depends_on:
      - db
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --hostname 0.0.0.0"

volumes:
  postgres_data:
  app_node_modules:
  app_next:
